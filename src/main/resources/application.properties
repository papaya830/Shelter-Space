spring.application.name=shelter-space-v1

# ---- H2 in-memory database (development) ----
spring.datasource.url=jdbc:h2:mem:shelterdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

server.port=8080

app.seed.enabled=true

# Local LLM support. Start Ollama and set enabled=true to use it for open-ended
# shelter questions. Booking actions remain on the deterministic keyword flow.
app.chatbot.ollama.enabled=false
app.chatbot.ollama.base-url=http://localhost:11434
app.chatbot.ollama.model=llama3.2:3b
app.chatbot.ollama.timeout-seconds=20
