<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelter-Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/app.css?v=20260721-turnaway-margins-v1">
</head>
<body>
<div id="root"></div>

<dialog id="public-shelter-dialog" class="public-shelter-dialog" aria-labelledby="public-shelter-dialog-title">
    <button type="button" id="public-shelter-dialog-close" class="icon-button public-dialog-close" aria-label="Close shelter details">×</button>
    <div id="public-shelter-dialog-content"></div>
</dialog>

<dialog id="booking-action-dialog" class="dialog">
    <form id="booking-action-form" method="dialog" class="dialog-form">
        <div class="dialog-header">
            <div>
                <p class="eyebrow" id="dialog-action-label">Booking action</p>
                <h3 id="dialog-title">Update booking</h3>
            </div>
            <button type="button" id="dialog-close" class="icon-button" aria-label="Close dialog">×</button>
        </div>

        <div id="dialog-booking-summary" class="dialog-summary"></div>

        <label class="field">
            <span>Staff name</span>
            <input id="dialog-staff-name" name="staffName" maxlength="120" required>
        </label>

        <label class="field">
            <span>Notes</span>
            <textarea id="dialog-notes" name="notes" rows="4" maxlength="1000" placeholder="Add intake notes or decision context"></textarea>
        </label>

        <div id="dialog-error" class="form-error hidden"></div>

        <div class="dialog-actions">
            <button type="button" id="dialog-cancel" class="button ghost">Cancel</button>
            <button type="submit" id="dialog-submit" class="button">Save action</button>
        </div>
    </form>
</dialog>

<script type="module" src="/assets/app.js?v=20260721-functional-smoke-v2"></script>
<script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
</script>
</body>
</html>
